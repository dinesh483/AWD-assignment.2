<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Player App - 61 CS 401</title>
  <style>
       * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #1a1a2e;
      color: #eeeeee;
      min-height: 100vh;
    }

        header {
      background-color: #16213e;
      padding: 12px 25px;
      border-bottom: 3px solid #e94560;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 20px;
      color: #e94560;
    }

    header p {
      font-size: 11px;
      color: #888;
    }
    .container {
      display: flex;
      height: calc(100vh - 55px);
    }

       .left-panel {
      width: 58%;
      padding: 18px;
      border-right: 1px solid #2a2a4a;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

       .search-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .search-row input,
    .search-row select {
      padding: 7px 11px;
      background: #16213e;
      border: 1px solid #333355;
      border-radius: 5px;
      color: #eee;
      font-size: 13px;
      outline: none;
    }

    .search-row input {
      flex: 1;
      min-width: 140px;
    }

    .search-row input:focus,
    .search-row select:focus {
      border-color: #e94560;
    }

       .sort-row {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    .sort-row label {
      font-size: 12px;
      color: #888;
    }

    .sort-btn {
      padding: 4px 11px;
      font-size: 12px;
      background: #16213e;
      border: 1px solid #333355;
      border-radius: 4px;
      color: #ccc;
      cursor: pointer;
    }

    .sort-btn.active {
      background: #e94560;
      border-color: #e94560;
      color: white;
    }

       .song-count-info {
      font-size: 12px;
      color: #777;
    }

    /* Song Cards Grid */
    .songs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 13px;
    }

    .song-card {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 13px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.1s;
    }

    .song-card:hover {
      border-color: #e94560;
      transform: translateY(-2px);
    }

    .song-card.active {
      border-color: #e94560;
      background: #1f1535;
    }

    .cover {
      width: 100%;
      height: 100px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      margin-bottom: 9px;
    }

    .song-title {
      font-size: 13px;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .song-artist {
      font-size: 11px;
      color: #aaa;
      margin-bottom: 2px;
    }

    .song-album {
      font-size: 10px;
      color: #666;
      margin-bottom: 7px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    .genre-badge {
      background: #0f3460;
      color: #e94560;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 10px;
    }

    .duration {
      font-size: 11px;
      color: #777;
    }

    .plays {
      font-size: 10px;
      color: #666;
      margin-left: auto;
    }

       .right-panel {
      width: 42%;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    /* Now Playing Box */
    .now-playing-box {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 18px;
    }

    .now-playing-box h3 {
      font-size: 12px;
      color: #e94560;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    #npEmoji {
      width: 100%;
      height: 130px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 55px;
      margin-bottom: 14px;
      background: #0f3460;
    }

    #npTitle {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 3px;
    }

    #npArtist {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 2px;
    }

    #npAlbum {
      font-size: 11px;
      color: #666;
      margin-bottom: 10px;
    }

    .np-tags {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .np-tag {
      font-size: 11px;
      background: #0f3460;
      padding: 3px 9px;
      border-radius: 10px;
      color: #aaa;
    }

    /* Progress Bar */
    .progress-wrap {
      background: #2a2a4a;
      border-radius: 99px;
      height: 5px;
      margin-bottom: 5px;
      overflow: hidden;
    }

    #progressBar {
      height: 100%;
      background: #e94560;
      border-radius: 99px;
      width: 0%;
      transition: width 0.5s linear;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #666;
      margin-bottom: 14px;
    }

    /* Controls */
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }

    .ctrl-btn {
      background: #0f3460;
      border: none;
      color: #ccc;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }

    .ctrl-btn:hover {
      background: #1a4a80;
    }

    #playBtn {
      background: #e94560;
      color: white;
      padding: 8px 20px;
      font-weight: bold;
    }

    #playBtn:hover {
      background: #c73652;
    }

    /* Recently Played */
    .recent-box {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 15px;
    }

    .recent-box h3 {
      font-size: 12px;
      color: #e94560;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .recent-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .recent-item:hover {
      background: #0f3460;
    }

    .recent-emoji {
      font-size: 22px;
      width: 32px;
      text-align: center;
    }

    .recent-title {
      font-size: 13px;
      font-weight: bold;
    }

    .recent-artist {
      font-size: 11px;
      color: #888;
    }

    /* Playlist Info */
    .playlist-info {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 13px 15px;
      font-size: 12px;
      color: #888;
      line-height: 1.7;
    }

    .playlist-info strong {
      color: #eee;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🎵 Music Player App</h1>
    </div>
  <p style="font-size:12px; color:#555;"></p>
</header>

<div class="container">

  <!-- LEFT: Song List -->
  <div class="left-panel">

    <!-- Search and Filters -->
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="🔍 Search songs, artist, album..." oninput="renderSongs()" />
      <select id="genreSelect" onchange="renderSongs()">
        <option value="">All Genres</option>
      </select>
      <select id="artistSelect" onchange="renderSongs()">
        <option value="">All Artists</option>
      </select>
    </div>

    <!-- Sort Buttons -->
    <div class="sort-row">
      <label>Sort by:</label>
      <button class="sort-btn active" onclick="setSort('title', this)">Title</button>
      <button class="sort-btn" onclick="setSort('artist', this)">Artist</button>
      <button class="sort-btn" onclick="setSort('duration', this)">Duration</button>
      <button class="sort-btn" onclick="setSort('playCount', this)">Most Played</button>
      <button class="sort-btn" onclick="setSort('favorite', this)">Favourites</button>
    </div>

    <span class="song-count-info" id="songCount"></span>

    <!-- Song Cards -->
    <div class="songs-grid" id="songsGrid"></div>
  </div>

  <!-- RIGHT: Player Panel -->
  <div class="right-panel">

    <!-- Now Playing -->
    <div class="now-playing-box">
      <h3>▶ Now Playing</h3>
      <div id="npEmoji">🎵</div>
      <h2 id="npTitle" style="font-size:16px; margin-bottom:3px;">Select a song</h2>
      <p id="npArtist" style="font-size:13px; color:#aaa; margin-bottom:2px;">—</p>
      <p id="npAlbum" style="font-size:11px; color:#666; margin-bottom:10px;">—</p>
      <div class="np-tags">
        <span class="np-tag" id="npGenre">—</span>
        <span class="np-tag" id="npDuration">0:00</span>
      </div>
      <div class="progress-wrap">
        <div id="progressBar"></div>
      </div>
      <div class="time-row">
        <span id="currentTime">0:00</span>
        <span id="npDuration2">0:00</span>
      </div>
      <div class="controls">
        <button class="ctrl-btn" onclick="prevSong()">⏮ Prev</button>
        <button class="ctrl-btn" id="playBtn" onclick="togglePlay()">▶ Play</button>
        <button class="ctrl-btn" onclick="nextSong()">Next ⏭</button>
      </div>
    </div>

    <!-- Recently Played -->
    <div class="recent-box">
      <h3>🕐 Recently Played</h3>
      <div id="recentList"></div>
    </div>

    <!-- Playlist Info -->
    <div class="playlist-info" id="playlistInfo"></div>

  </div>
</div>

<script>
"use strict";
const songData = [
    { id: 1,  title: "Enjoy Enjaami",        artist: "Dhee ft. Arivu",      album: "Enjoy Enjaami",       genre: "Folk Rap",    duration: "4:22", favorite: true,  playCount: 85, emoji: "🌿", color: "#27ae60" },
    { id: 2,  title: "Kannaana Kanney",       artist: "D. Imman",            album: "Viswasam",            genre: "Melody",      duration: "4:45", favorite: true,  playCount: 72, emoji: "💛", color: "#f39c12" },
    { id: 3,  title: "Rowdy Baby",            artist: "Dhanush & Dhee",      album: "Maari 2",             genre: "Folk",        duration: "3:58", favorite: false, playCount: 91, emoji: "💃", color: "#e94560" },
    { id: 4,  title: "Vaa Machan",            artist: "Yuvan Shankar Raja",  album: "Darling",             genre: "Hip Hop",     duration: "3:12", favorite: false, playCount: 38, emoji: "🎤", color: "#9b59b6" },
    { id: 5,  title: "Kanave Kanave",         artist: "Clinton Cerejo",      album: "David",               genre: "Melody",      duration: "4:31", favorite: true,  playCount: 55, emoji: "🌙", color: "#2980b9" },
    { id: 6,  title: "Usure Pogudhey",        artist: "AR Rahman",           album: "Raavanan",            genre: "Classical",   duration: "5:10", favorite: false, playCount: 43, emoji: "🪔", color: "#c0392b" },
    { id: 7,  title: "Aalaporaan Thamizhan", artist: "AR Rahman",           album: "Mersal",              genre: "Mass",        duration: "4:02", favorite: true,  playCount: 78, emoji: "🦁", color: "#e67e22" },
    { id: 8,  title: "Mazhai Kuruvi",         artist: "AR Rahman",           album: "Chekka Chivantha Vaanam", genre: "Melody", duration: "4:18", favorite: false, playCount: 29, emoji: "🌧️", color: "#16a085" },
    { id: 9,  title: "Kaaney Kaaney",         artist: "Yuvan Shankar Raja",  album: "Kadhal Kondein",      genre: "Melody",      duration: "5:22", favorite: true,  playCount: 61, emoji: "❤️", color: "#8e44ad" },
    { id: 10, title: "Naattu Naattu",         artist: "MM Keeravaani",       album: "RRR",                 genre: "Folk Dance",  duration: "3:46", favorite: true,  playCount: 99, emoji: "🥁", color: "#d35400" },
    { id: 11, title: "Nenjukkul Peidhidum",   artist: "Harris Jayaraj",      album: "Vaaranam Aayiram",    genre: "Melody",      duration: "4:55", favorite: false, playCount: 47, emoji: "🌧", color: "#1abc9c" },
    { id: 12, title: "Vaathi Coming",         artist: "Anirudh Ravichander", album: "Master",              genre: "Mass",        duration: "3:34", favorite: true,  playCount: 88, emoji: "🔥", color: "#f1c40f" },
];
const myPlaylist = {
    name: "Tamil Hits Playlist",
    songs: songData,
    createdDate: new Date("2025-01-01"),
    songCount: songData.length
};
// Recently played tuple - fixed size of 5
let recentlyPlayed = [1, 3, 7, 10, 12];
let currentSongId = null;
let isPlaying = false;
let currentSort = "title";
let progressTimer = null;
let elapsedSeconds = 0;
function filterByGenre(songs, genre) {
    if (genre === "")
        return songs;
    return songs.filter((s) => s.genre === genre);
}
function filterByArtist(songs, artist) {
    if (artist === "")
        return songs;
    return songs.filter((s) => s.artist === artist);
}
function searchSongs(songs, query) {
    if (query === "")
        return songs;
    const q = query.toLowerCase();
    return songs.filter((s) => s.title.toLowerCase().includes(q) ||
        s.artist.toLowerCase().includes(q) ||
        s.album.toLowerCase().includes(q));
}
function sortBy(songs, key) {
    return [...songs].sort((a, b) => {
        if (key === "duration") {
            const toSec = (d) => {
                const parts = d.split(":");
                return parseInt(parts[0]) * 60 + parseInt(parts[1]);
            };
            return toSec(a.duration) - toSec(b.duration);
        }
        if (key === "playCount")
            return b.playCount - a.playCount;
        if (key === "favorite")
            return (b.favorite === a.favorite ? 0 : b.favorite ? 1 : -1);
        return String(a[key]).localeCompare(String(b[key]));
    });
}
function playSong(id) {
    var _a, _b, _c, _d;
    const song = songData.find((s) => s.id === id);
    if (!song)
        return;
    currentSongId = id;
    isPlaying = true;
    song.playCount++;
    // Update recently played tuple (max 5)
    const filtered = recentlyPlayed.filter((rid) => rid !== id);
    filtered.unshift(id);
    recentlyPlayed = [filtered[0], (_a = filtered[1]) !== null && _a !== void 0 ? _a : id, (_b = filtered[2]) !== null && _b !== void 0 ? _b : id, (_c = filtered[3]) !== null && _c !== void 0 ? _c : id, (_d = filtered[4]) !== null && _d !== void 0 ? _d : id];
    updateNowPlaying(song);
    renderSongs();
    renderRecentlyPlayed();
    startProgressTimer(song.duration);
}
function togglePlay() {
    if (currentSongId === null)
        return;
    isPlaying = !isPlaying;
    document.getElementById("playBtn").textContent = isPlaying ? "⏸ Pause" : "▶ Play";
}
function prevSong() {
    const idx = songData.findIndex((s) => s.id === currentSongId);
    const prevIdx = (idx - 1 + songData.length) % songData.length;
    playSong(songData[prevIdx].id);
}
function nextSong() {
    const idx = songData.findIndex((s) => s.id === currentSongId);
    const nextIdx = (idx + 1) % songData.length;
    playSong(songData[nextIdx].id);
}
function startProgressTimer(duration) {
    if (progressTimer !== null)
        clearInterval(progressTimer);
    elapsedSeconds = 0;
    const parts = duration.split(":");
    const totalSecs = parseInt(parts[0]) * 60 + parseInt(parts[1]);
    progressTimer = window.setInterval(() => {
        if (!isPlaying)
            return;
        elapsedSeconds++;
        if (elapsedSeconds >= totalSecs) {
            elapsedSeconds = 0;
            nextSong();
            return;
        }
        const pct = Math.floor((elapsedSeconds / totalSecs) * 100);
        const bar = document.getElementById("progressBar");
        if (bar)
            bar.style.width = pct + "%";
        const mins = Math.floor(elapsedSeconds / 60);
        const secs = elapsedSeconds % 60;
        const timeEl = document.getElementById("currentTime");
        if (timeEl)
            timeEl.textContent = `${mins}:${secs.toString().padStart(2, "0")}`;
    }, 1000);
}
function updateNowPlaying(song) {
    document.getElementById("npEmoji").textContent = song.emoji;
    document.getElementById("npEmoji").style.background = song.color + "33";
    document.getElementById("npTitle").textContent = song.title;
    document.getElementById("npArtist").textContent = song.artist;
    document.getElementById("npAlbum").textContent = song.album;
    document.getElementById("npDuration").textContent = song.duration;
    document.getElementById("npGenre").textContent = song.genre;
    document.getElementById("playBtn").textContent = "⏸ Pause";
    document.getElementById("progressBar").style.width = "0%";
    document.getElementById("npDuration2").textContent = song.duration;
    document.getElementById("currentTime").textContent = "0:00";
}
function renderSongs() {
    const query = document.getElementById("searchInput").value;
    const genre = document.getElementById("genreSelect").value;
    const artist = document.getElementById("artistSelect").value;
    let result = myPlaylist.songs;
    result = searchSongs(result, query);
    result = filterByGenre(result, genre);
    result = filterByArtist(result, artist);
    result = sortBy(result, currentSort);
    const grid = document.getElementById("songsGrid");
    const countEl = document.getElementById("songCount");
    countEl.textContent = `Showing ${result.length} of ${myPlaylist.songCount} songs`;
    if (result.length === 0) {
        grid.innerHTML = `<p style="color:#888; padding:20px; grid-column:1/-1;">No songs found.</p>`;
        return;
    }
    grid.innerHTML = result.map((s) => `
    <div class="song-card ${currentSongId === s.id ? "active" : ""}" onclick="playSong(${s.id})">
      <div class="cover" style="background:${s.color}22;">${s.emoji}</div>
      <div class="song-info">
        <p class="song-title">${s.title}</p>
        <p class="song-artist">${s.artist}</p>
        <p class="song-album">${s.album}</p>
        <div class="song-meta">
          <span class="genre-badge">${s.genre}</span>
          <span class="duration">${s.duration}</span>
          <span>${s.favorite ? "❤️" : "🤍"}</span>
          <span class="plays">▶ ${s.playCount}</span>
        </div>
      </div>
    </div>
  `).join("");
}
function renderRecentlyPlayed() {
    const container = document.getElementById("recentList");
    container.innerHTML = recentlyPlayed.map((id) => {
        const s = songData.find((x) => x.id === id);
        if (!s)
            return "";
        return `
      <div class="recent-item" onclick="playSong(${s.id})">
        <span class="recent-emoji">${s.emoji}</span>
        <div>
          <p class="recent-title">${s.title}</p>
          <p class="recent-artist">${s.artist}</p>
        </div>
      </div>`;
    }).join("");
}
function populateDropdowns() {
    const genres = [...new Set(songData.map((s) => s.genre))].sort();
    const artists = [...new Set(songData.map((s) => s.artist))].sort();
    const genreEl = document.getElementById("genreSelect");
    const artistEl = document.getElementById("artistSelect");
    genres.forEach((g) => {
        const opt = document.createElement("option");
        opt.value = g;
        opt.textContent = g;
        genreEl.appendChild(opt);
    });
    artists.forEach((a) => {
        const opt = document.createElement("option");
        opt.value = a;
        opt.textContent = a;
        artistEl.appendChild(opt);
    });
}
function setSort(key, btn) {
    currentSort = key;
    document.querySelectorAll(".sort-btn").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    renderSongs();
}

populateDropdowns();
renderSongs();
renderRecentlyPlayed();
playSong(1);

// Render playlist info box
function renderPlaylistInfo() {
  const el = document.getElementById("playlistInfo");
  if (!el) return;
  const totalSongs = myPlaylist.songCount;
  const favCount = myPlaylist.songs.filter(s => s.favorite).length;
  const toSec = (d) => { const p = d.split(":"); return parseInt(p[0])*60+parseInt(p[1]); };
  const totalMins = Math.floor(myPlaylist.songs.reduce((acc, s) => acc + toSec(s.duration), 0) / 60);
  el.innerHTML = `
    <strong>📋 ${myPlaylist.name}</strong><br/>
    Created: ${myPlaylist.createdDate.toDateString()}<br/>
    Total Songs: <strong>${totalSongs}</strong> &nbsp;|&nbsp;
    Favourites: <strong>${favCount}</strong> &nbsp;|&nbsp;
    Total Duration: <strong>~${totalMins} mins</strong>
  `;
}
renderPlaylistInfo();

</script>
</body>
</html>
